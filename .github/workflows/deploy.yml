name: Deploy

# Build+push always runs on main (so GHCR always has a fresh `latest` for the
# images issue #12 defines). The actual VPS rollout is manual (workflow_dispatch)
# — it needs VPS_HOST/VPS_SSH_KEY secrets this repo doesn't have configured yet,
# and a real VPS/domain to be meaningful (see deploy/README.md "Production").
# Don't gate build-and-push behind those secrets existing; only the ssh-deploy
# job needs them, and only when someone deliberately runs it.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_vps:
        description: "Also SSH into the VPS and roll out (requires VPS_HOST/VPS_SSH_KEY/VPS_USER secrets)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - assembly: core.WebApi
            project_path: core.WebApi/core.WebApi.csproj
            image: wavio-core
          - assembly: WaGateway.WebApi
            project_path: WaGateway.WebApi/WaGateway.WebApi.csproj
            image: wavio-wagateway-webapi
          - assembly: WaIngest.WebApi
            project_path: WaIngest.WebApi/WaIngest.WebApi.csproj
            image: wavio-waingest-webapi
          - assembly: WaAdmin.WebApi
            project_path: WaAdmin.WebApi/WaAdmin.WebApi.csproj
            image: wavio-waadmin-webapi
          - assembly: WaBilling.WebApi
            project_path: WaBilling.WebApi/WaBilling.WebApi.csproj
            image: wavio-wabilling-webapi
          - assembly: WaIntel.WebApi
            project_path: WaIntel.WebApi/WaIntel.WebApi.csproj
            image: wavio-waintel-webapi
          - assembly: wavio.Gateway
            project_path: wavio.Gateway/wavio.Gateway.csproj
            image: wavio-wavio-gateway
          - assembly: wavio.DbMigrator
            project_path: wavio.DbMigrator/wavio.DbMigrator.csproj
            image: wavio-dbmigrator
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/wavio
          file: ./src/backend/wavio/Dockerfile
          build-args: |
            PROJECT_PATH=${{ matrix.project_path }}
            ASSEMBLY_NAME=${{ matrix.assembly }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ssh-deploy:
    name: Roll out to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_vps
    steps:
      # No VPS exists yet, so VPS_HOST/VPS_USER/VPS_SSH_KEY aren't configured —
      # this workflow must still be mergeable. Check for the secrets explicitly
      # and skip cleanly (clear log message, job succeeds) rather than let the
      # ssh-action step fail with a cryptic connection error.
      - name: Check VPS secrets are configured
        id: secrets-check
        # Secrets are passed via env: and tested as shell variables below, never interpolated
        # directly into the run: script text — keeps `${{ secrets.* }}` out of shell logic.
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_FINGERPRINT: ${{ secrets.VPS_HOST_FINGERPRINT }}
        run: |
          # VPS_HOST_FINGERPRINT is part of the gate on purpose: ssh-action treats an empty
          # fingerprint: input as "don't verify the host key", so running with the other three
          # secrets set but this one missing would silently drop the S3 MITM protection.
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST_FINGERPRINT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VPS_HOST/VPS_USER/VPS_SSH_KEY/VPS_HOST_FINGERPRINT are not all configured yet — skipping the actual rollout. Expected before a VPS exists; configure these repo secrets when ready (see deploy/README.md \"Production\")."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll out
        if: steps.secrets-check.outputs.configured == 'true'
        # Pinned to a commit SHA, not the mutable "v1" tag (S3) — a mutable tag can be
        # repointed by the action's maintainer (or an attacker who compromises their account)
        # to run arbitrary code with VPS_SSH_KEY in scope. Verified 2026-07-06: this SHA is
        # exactly what both the "v1" tag and the tagged "v1.2.5" release point to (`gh api
        # repos/appleboy/ssh-action/tags` — same commit object for both refs). Bump
        # deliberately: re-check the new tag's commit SHA before repinning.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # SHA256 fingerprint of the VPS's SSH host key, so this action verifies the host
          # identity instead of trusting it blindly on first connect (MITM protection). Get
          # it BEFORE VPS_SSH_KEY is ever configured/used, either directly on the VPS (per
          # appleboy/ssh-action's own docs):
          #   ssh <vps-host> ssh-keygen -l -f /etc/ssh/ssh_host_ed25519_key.pub | cut -d ' ' -f2
          # or, if you don't have a session yet, from a trusted machine:
          #   ssh-keyscan -H <vps-host> | ssh-keygen -lf -
          # then store the printed "SHA256:...." string as the VPS_HOST_FINGERPRINT secret.
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script: |
            set -euo pipefail
            cd /opt/wavio
            git pull --ff-only
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm migrator
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
